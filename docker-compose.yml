version: '3.9'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn src.isat_pipeline.api.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
