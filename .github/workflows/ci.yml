name: iSAT Pipeline CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Login en Azure usando el JSON de AZURE_CREDENTIALS
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 2. Login en tu nuevo Almacén de Contenedores (ACR)
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 3. Construir la imagen Docker y subirla
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/isat-app:${{ github.sha }} .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/isat-app:${{ github.sha }}
          docker tag ${{ secrets.ACR_LOGIN_SERVER }}/isat-app:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/isat-app:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/isat-app:latest